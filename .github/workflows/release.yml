name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

env:
  GO_VERSION: '1.24.11'
  GOPRIVATE: github.com/bytefreezer/*
  BINARY_NAME: bytefreezer-connector

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test on Main Branch
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Configure git for private modules
      run: git config --global url."https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Run go vet
      run: go vet ./...

  build:
    name: Build Binaries
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux]
        arch: [amd64]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Configure git for private modules
      run: git config --global url."https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Build binary
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        if [ "${{ github.ref_type }}" != "tag" ]; then
          git fetch --tags --force
          TAG=$(git tag --points-at HEAD | grep '^v' | sort -V | tail -1)
          if [ -n "$TAG" ]; then
            VERSION=${TAG#v}
          else
            VERSION="main-${GITHUB_SHA:0:8}"
          fi
        fi
        BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        go build \
          -ldflags="-s -w -X main.version=${VERSION} -X main.buildTime=${BUILD_TIME} -X main.gitCommit=${GITHUB_SHA}" \
          -o ${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }} .

    - name: Create tarball
      run: |
        mkdir -p release
        tar -czf release/${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz \
          ${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }} \
          config.yaml

  docker:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/${{ env.BINARY_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=sha,prefix=sha-
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Determine version
      id: version
      run: |
        if [ "${{ github.ref_type }}" = "tag" ]; then
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=main-${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT
        fi
        echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

    - name: Generate fallback tag
      id: fallback
      run: |
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        FALLBACK_TAG="ghcr.io/${{ github.repository_owner }}/${{ env.BINARY_NAME }}:sha-${SHORT_SHA}"
        echo "tag=${FALLBACK_TAG}" >> $GITHUB_OUTPUT

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags || steps.fallback.outputs.tag }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          VERSION=${{ steps.version.outputs.VERSION }}
          BUILD_TIME=${{ steps.version.outputs.BUILD_TIME }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  debian:
    name: Build Debian Package
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Configure git for private modules
      run: git config --global url."https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

    - name: Build binary for Debian package
      env:
        GOOS: linux
        GOARCH: amd64
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        if [ "${{ github.ref_type }}" != "tag" ]; then
          VERSION="0.0.0-main.${GITHUB_SHA:0:8}"
        fi
        BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        mkdir -p binary
        go build -ldflags="-s -w -X main.version=${VERSION} -X main.buildTime=${BUILD_TIME} -X main.gitCommit=${GITHUB_SHA}" -o binary/bytefreezer-connector-linux-amd64 .
        chmod +x binary/bytefreezer-connector-linux-amd64

    - name: Install FPM for package building
      run: |
        sudo apt-get update
        sudo apt-get install -y ruby-dev build-essential
        sudo gem install fpm

    - name: Create Debian package structure
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        if [ "${{ github.ref_type }}" != "tag" ]; then
          VERSION="0.0.0-main.${GITHUB_SHA:0:8}"
        fi

        # Create package directories
        mkdir -p pkg/{usr/local/bin,etc/bytefreezer-connector,etc/systemd/system,etc/logrotate.d,var/log/bytefreezer-connector}

        # Copy binary
        cp binary/bytefreezer-connector-linux-amd64 pkg/usr/local/bin/bytefreezer-connector
        chmod +x pkg/usr/local/bin/bytefreezer-connector

        # Copy config
        cp config.yaml pkg/etc/bytefreezer-connector/config.yaml

        # Create systemd service file
        cat > pkg/etc/systemd/system/bytefreezer-connector.service << 'EOF'
        [Unit]
        Description=ByteFreezer Connector - Data export and query service
        Documentation=https://github.com/bytefreezer/connector
        After=network-online.target
        Wants=network-online.target

        [Service]
        Type=simple
        User=root
        Group=root
        WorkingDirectory=/usr/local/bin
        ExecStart=/usr/local/bin/bytefreezer-connector --config="/etc/bytefreezer-connector/config.yaml"
        ExecReload=/bin/kill -HUP $MAINPID
        KillMode=mixed
        KillSignal=SIGTERM
        TimeoutStopSec=30

        # Restart settings
        Restart=always
        RestartSec=10
        StartLimitInterval=60
        StartLimitBurst=5

        # Resource limits
        LimitNOFILE=65536
        LimitNPROC=4096

        # Logging to files
        StandardOutput=append:/var/log/bytefreezer-connector/bytefreezer-connector.log
        StandardError=append:/var/log/bytefreezer-connector/bytefreezer-connector-error.log

        # Environment
        Environment=CONFIG_FILE=/etc/bytefreezer-connector/config.yaml
        Environment=LOG_LEVEL=INFO

        [Install]
        WantedBy=multi-user.target
        EOF

        # Create logrotate configuration
        cat > pkg/etc/logrotate.d/bytefreezer-connector << 'EOF'
        /var/log/bytefreezer-connector/*.log {
          daily
          rotate 7
          compress
          missingok
          notifempty
          create 0644 root root
          sharedscripts
          postrotate
            systemctl restart bytefreezer-connector >/dev/null 2>&1 || true
          endscript
        }
        EOF

    - name: Create post-install script
      run: |
        mkdir -p debian
        cat > debian/postinst << 'EOF'
        #!/bin/bash
        set -e

        # Ensure directories exist with correct permissions
        mkdir -p /var/log/bytefreezer-connector
        chmod 755 /var/log/bytefreezer-connector

        # Reload systemd and enable service
        systemctl daemon-reload || true
        systemctl enable bytefreezer-connector || true

        echo "ByteFreezer Connector installed successfully!"
        echo "Configure /etc/bytefreezer-connector/config.yaml and run: systemctl start bytefreezer-connector"
        EOF
        chmod +x debian/postinst

    - name: Create pre-remove script
      run: |
        cat > debian/prerm << 'EOF'
        #!/bin/bash
        set -e

        # Stop service before removal
        systemctl stop bytefreezer-connector || true
        systemctl disable bytefreezer-connector || true
        EOF
        chmod +x debian/prerm

    - name: Create post-remove script
      run: |
        cat > debian/postrm << 'EOF'
        #!/bin/bash
        set -e

        # Clean up after removal
        systemctl daemon-reload || true

        echo "ByteFreezer Connector removed. Log directories preserved."
        EOF
        chmod +x debian/postrm

    - name: Build Debian package
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        if [ "${{ github.ref_type }}" != "tag" ]; then
          VERSION="0.0.0-main.${GITHUB_SHA:0:8}"
        fi
        PACKAGE_NAME="bytefreezer-connector"

        fpm -s dir -t deb \
          -n "$PACKAGE_NAME" \
          -v "$VERSION" \
          -a amd64 \
          -m "ByteFreezer <noreply@bytefreezer.io>" \
          --description "ByteFreezer Connector - Data export and query service (DuckDB-powered)" \
          --url "https://github.com/bytefreezer/connector" \
          --license "MIT" \
          --category "database" \
          --depends "systemd" \
          --depends "libc6" \
          --after-install debian/postinst \
          --before-remove debian/prerm \
          --after-remove debian/postrm \
          -C pkg \
          .

    - name: Upload Debian package artifact
      uses: actions/upload-artifact@v4
      with:
        name: debian-package
        path: "*.deb"

  release:
    name: Create Release
    needs: [build, docker, debian]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Create Release with Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: ${{ contains(github.ref_name, '-') }}
        files: |
          ./artifacts/*/*.tar.gz
          ./artifacts/*/*.deb
        generate_release_notes: true
        body: |
          ## ByteFreezer Connector ${{ github.ref_name }}

          ### Installation

          **Debian/Ubuntu Package (Recommended):**
          ```bash
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/bytefreezer-connector_${VERSION}_amd64.deb
          sudo dpkg -i bytefreezer-connector_*.deb

          # Configure and start
          sudo nano /etc/bytefreezer-connector/config.yaml
          sudo systemctl start bytefreezer-connector
          sudo systemctl status bytefreezer-connector
          ```

          **Docker:**
          ```bash
          docker pull ghcr.io/${{ github.repository_owner }}/${{ env.BINARY_NAME }}:${{ github.ref_name }}
          docker run -p 8090:8090 -v $(pwd)/config.yaml:/app/config.yaml ghcr.io/${{ github.repository_owner }}/${{ env.BINARY_NAME }}:${{ github.ref_name }}
          ```

          **Binary Extraction from Container:**
          ```bash
          docker run --rm -v $(pwd):/output ghcr.io/${{ github.repository_owner }}/${{ env.BINARY_NAME }}:${{ github.ref_name }} sh -c "cp /app/bytefreezer-connector /output/"
          chmod +x bytefreezer-connector
          ./bytefreezer-connector --config config.yaml
          ```

          > **Note:** The connector requires glibc (uses DuckDB with CGO). Use the .deb package or Docker image on Debian/Ubuntu systems. Alpine (musl) is not supported for bare-metal installs.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Deployment Notification
    needs: [release]
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Notify success
      if: needs.release.result == 'success'
      run: |
        echo "ByteFreezer Connector ${{ github.ref_name }} released successfully!"
        echo "Docker image: ghcr.io/${{ github.repository_owner }}/${{ env.BINARY_NAME }}:${{ github.ref_name }}"
        echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

    - name: Notify failure
      if: needs.release.result == 'failure'
      run: |
        echo "ByteFreezer Connector ${{ github.ref_name }} release failed!"
        exit 1
