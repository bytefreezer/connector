# ByteFreezer Connector - Example Configuration
# Modes: interactive (web UI), batch (run once), watch (continuous poll)

logging:
  level: info

server:
  port: 8090  # HTTP port for interactive mode

# Control plane connection (required)
control:
  url: "https://api.bytefreezer.com"
  api_key: ""       # Your API key or service key
  account_id: ""    # Your account ID

# Health reporting to control plane
health_reporting:
  enabled: true
  report_interval: 30

# Query configuration (required for batch/watch modes, optional for interactive)
query:
  tenant_id: ""
  dataset_id: ""
  # SQL query — use PARQUET_PATH as placeholder for S3 parquet glob path
  sql: "SELECT * FROM read_parquet('PARQUET_PATH', hive_partitioning=true, union_by_name=true) LIMIT 100"

# Destination for exported data
destination:
  type: stdout  # stdout, elasticsearch, webhook
  config: {}
  # Elasticsearch example:
  #   type: elasticsearch
  #   config:
  #     url: "http://localhost:9200"
  #     index: "bytefreezer-logs"
  #     username: ""
  #     password: ""
  # Webhook example:
  #   type: webhook
  #   config:
  #     url: "https://example.com/webhook"
  #     headers:
  #       Authorization: "Bearer your-token"

# Cursor persistence (tracks export progress for at-least-once delivery)
cursor:
  file: cursor.json

# Schedule settings for watch mode
schedule:
  interval_seconds: 60   # How often to poll for new data
  batch_size: 1000       # Records per batch sent to destination
